# Withered Hearts access transformer
#
# GuiHeartsMixin must reference two private members of net.minecraft.client.gui.Gui
# from Java source, so both are widened to public. The NeoForge moddev toolchain
# runs against official Mojang (Mojmap) names, so entries use Mojmap names here.
#
# 1) Gui$HeartType — a private nested enum. Needed so the mixin can name the
#    HeartType type, compare against HeartType.WITHERED / NORMAL / CONTAINER,
#    and use it as the @WrapOperation return / parameter type.
public net.minecraft.client.gui.Gui$HeartType

# 2) Gui#renderHeart(GuiGraphics, Gui$HeartType, int, int, boolean, boolean, boolean)
#    — the private per-heart draw method wrapped by injection #2.
public net.minecraft.client.gui.Gui renderHeart(Lnet/minecraft/client/gui/GuiGraphics;Lnet/minecraft/client/gui/Gui$HeartType;IIZZZ)V
